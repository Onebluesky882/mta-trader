name = "atp-bot-trader-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
FROM_EMAIL = "noreply@yourdomain.com"
OWNER_EMAIL = "wansing05@gmail.com"
R2_ACCOUNT_ID = "c40a6cc1eb575a43f79e9b4d9cc6a88d"
R2_BUCKET_NAME = "atp-bot-trader-storage"
GITHUB_REPO_OWNER = ""
GITHUB_TEMPLATE_REPO = ""
# Secrets — set via: wrangler secret put <NAME>
# RESEND_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_PUBLISHABLE_KEY
# STRIPE_WEBHOOK_SECRET
# MT5_WEBHOOK_SECRET
# BOT_TOKEN
# TELEGRAM_SECRET_TOKEN
# TELEGRAM_CHAT_ID
# MT5_WEBHOOK_SECRET
# R2_ACCESS_KEY_ID      — R2 API token Access Key ID (dashboard: R2 > Manage API Tokens)
# R2_SECRET_ACCESS_KEY  — R2 API token Secret Access Key

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "atp-bot-trader-storage"

[[d1_databases]]
binding = "DB"
database_name = "mta-trader-db"
database_id = "4f36a5f5-3d8b-4477-a129-d6be5c240d0f"
